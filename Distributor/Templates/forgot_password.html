{% extends 'base.html' %}
{% load static %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="glass-card p-4 p-md-5 mt-4 fade-in">
      <div class="text-center mb-4">
        <h2 class="fw-bold text-corp">Forgot Password</h2>
        <p class="text-muted-corp">Enter your registered email address to receive a 6-digit verification OTP</p>
      </div>

      <form method="post" class="needs-validation" id="forgotForm" novalidate>
        {% csrf_token %}

        <div class="mb-4">
          <label for="email" class="form-label text-corp fw-semibold">Email address</label>
          <input type="email" name="email" class="form-control bg-transparent text-corp" id="email" required>
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 btn-anim d-flex align-items-center justify-content-center" id="submitBtn">
          <span id="btnText">Request OTP Code</span>
          <span class="spinner-border spinner-border-sm ms-2 d-none" role="status" id="btnSpinner"></span>
        </button>

        <div class="mt-4 text-center">
          <a href="{% url 'login' %}" class="text-primary text-decoration-none small fw-bold">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  (function () {
    'use strict'
    const form = document.getElementById('forgotForm');
    form.addEventListener('submit', function (event) {
      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
      } else {
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('btnText').textContent = "Generating OTP...";
        document.getElementById('btnSpinner').classList.remove('d-none');
      }
      form.classList.add('was-validated');
    }, false);
  })();
</script>
{% endblock %}
